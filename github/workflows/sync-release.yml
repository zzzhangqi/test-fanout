name: sync-release

on:
  workflow_dispatch:
    inputs:
      version:
        description: release tag
        required: true
        type: string
      source_release_url:
        description: upstream release url
        required: true
        type: string

permissions:
  contents: write

concurrency:
  group: sync-release-${{ github.event.inputs.version }}
  cancel-in-progress: false

jobs:
  sync-release:
    runs-on: ubuntu-latest
    env:
      VERSION: ${{ github.event.inputs.version }}
      SOURCE_RELEASE_URL: ${{ github.event.inputs.source_release_url }}
    steps:
      - name: Checkout main
        uses: actions/checkout@v4
        with:
          ref: main
          fetch-depth: 0

      - name: Validate inputs
        shell: bash
        run: |
          set -euo pipefail
          [[ "${VERSION}" =~ ^v.+-release$ ]]

      - name: Fetch main and tags
        run: git fetch origin main --tags --force

      - name: Ensure tag points to main
        id: ensure_tag
        shell: bash
        run: |
          set -euo pipefail

          main_sha=$(git rev-parse origin/main)
          echo "main_sha=${main_sha}" >> "${GITHUB_OUTPUT}"

          if git rev-parse -q --verify "refs/tags/${VERSION}" >/dev/null; then
            tag_sha=$(git rev-list -n 1 "${VERSION}")
            if [ "${tag_sha}" != "${main_sha}" ]; then
              echo "tag ${VERSION} points to ${tag_sha}, expected ${main_sha}" >&2
              exit 1
            fi
          else
            git tag "${VERSION}" "${main_sha}"
            git push origin "refs/tags/${VERSION}"
          fi

      - name: Upsert release
        uses: actions/github-script@v7
        env:
          MAIN_SHA: ${{ steps.ensure_tag.outputs.main_sha }}
        with:
          script: |
            const owner = context.repo.owner;
            const repo = context.repo.repo;
            const tagName = process.env.VERSION;
            const sourceReleaseUrl = process.env.SOURCE_RELEASE_URL;
            const targetCommitish = process.env.MAIN_SHA;

            const generated = await github.rest.repos.generateReleaseNotes({
              owner,
              repo,
              tag_name: tagName,
              target_commitish: targetCommitish
            });

            const notes = generated.data.body ? generated.data.body.trim() : '';
            const body = [`Update reference: ${sourceReleaseUrl}`, notes]
              .filter(Boolean)
              .join('\n\n');

            try {
              const existing = await github.rest.repos.getReleaseByTag({
                owner,
                repo,
                tag: tagName
              });

              await github.rest.repos.updateRelease({
                owner,
                repo,
                release_id: existing.data.id,
                tag_name: tagName,
                name: tagName,
                body,
                draft: false,
                prerelease: false
              });
            } catch (error) {
              if (error.status !== 404) {
                throw error;
              }

              await github.rest.repos.createRelease({
                owner,
                repo,
                tag_name: tagName,
                target_commitish: targetCommitish,
                name: tagName,
                body,
                draft: false,
                prerelease: false
              });
            }
